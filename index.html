<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheena Marie - Birthday Bloom</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background" id="background"></div>
    <canvas id="particleCanvas" class="particle-canvas"></canvas>
    
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>Sheena Marie</h1>
            <p id="instruction">Who is your best friend?</p>
            <div class="answer-group">
                <input 
                    type="text" 
                    id="answerInput" 
                    placeholder="Type your answer..." 
                    class="answer-input"
                    autocomplete="off"
                >
                <button id="submitBtn" class="submit-btn">Submit</button>
            </div>
            <p id="status" class="status"></p>
        </header>

        <!-- Main Experience -->
        <main class="main-experience">
            <!-- Cake Section -->
            <div id="cakeSection" class="cake-section active">
                <div class="cake-wrapper">
                    <div class="cake">
                        <div class="cake-layer cake-bottom"></div>
                        <div class="cake-layer cake-middle"></div>
                        <div class="cake-layer cake-top"></div>
                    </div>

                    <div class="candles-container">
                        <div class="candle">
                            <div class="flame"></div>
                            <div class="candle-stick"></div>
                        </div>
                        <div class="candle">
                            <div class="flame"></div>
                            <div class="candle-stick"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bouquet Section (Hidden Initially) -->
            <div id="bouquetSection" class="bouquet-section hidden">
                <div class="bouquet-wrapper">
                    <div class="stem-container">
                        <div class="stem"></div>
                    </div>

                    <div class="petals-container" id="petalsContainer">
                        <!-- Image petals will be generated here -->
                    </div>

                    <div class="leaves">
                        <div class="leaf leaf-left"></div>
                        <div class="leaf leaf-right"></div>
                    </div>

                    <div class="ribbon-bow"></div>
                </div>
            </div>
        </main>

        <!-- Message -->
        <footer class="footer">
            <p id="footerMessage" class="footer-message"></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
